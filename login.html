<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>CogniCare 2.0 | Login</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"><link rel="stylesheet" href="theme.css"><link rel="stylesheet" href="login.css"></head><body><main class="auth-shell container-shell"><section class="auth-panel glass"><div class="auth-copy"><span class="eyebrow">Secure access</span><h1>Welcome back to CogniCare</h1><p class="muted">Sign in to continue to your screening workspace, reports, and future cloud-synced assessment history.</p></div><form class="auth-form card" id="loginForm"><label>Email</label><input type="email" id="email" placeholder="demo@cognicare.ai" required><label>Password</label><input type="password" id="password" placeholder="••••••••" required><button type="submit" class="primary-btn" id="submitBtn">Enter Workspace</button><div id="errorMessage" style="color: #ff4d4d; margin-top: 10px; font-size: 0.9em; display: none;"></div><p class="helper">Secure authentication · assessments will be synced to your profile.</p><a href="register.html" class="ghost-btn full">Create account</a></form></section></main><script src="auth.js?v=3"></script><script src="storage.js?v=3"></script><script>
document.addEventListener('DOMContentLoaded', () => {
    if (typeof CogniCareStorage !== 'undefined') CogniCareStorage.resetExam();
});
document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const submitBtn = document.getElementById('submitBtn');
    const errorEl = document.getElementById('errorMessage');

    submitBtn.disabled = true;
    submitBtn.innerText = 'Authenticating...';
    errorEl.style.display = 'none';

    if (typeof CogniCareStorage !== 'undefined') CogniCareStorage.resetExam();

    try {
        await CogniCareAuth.login(email, password);
        window.location.href = 'exam.html';
    } catch (err) {
        errorEl.innerText = err.message || 'Login failed. Please check your credentials.';
        errorEl.style.display = 'block';
        submitBtn.disabled = false;
        submitBtn.innerText = 'Enter Workspace';
    }
});
</script></body></html>
